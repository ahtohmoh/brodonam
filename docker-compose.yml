# ───────────────────────────────────────────────────────────────
# BRODONAM — production stack
#
# Run:    docker compose up -d
# Logs:   docker compose logs -f brodonam
# Stop:   docker compose down
#
# Set the variables in .env first (see .env.example).
# SQLite data persists in the named volume `brodonam_data`.
# ───────────────────────────────────────────────────────────────

services:
  brodonam:
    build: .
    image: brodonam:latest
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:3001"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3001
      BRODONAM_DB_PATH: /app/data/brodonam.db
    volumes:
      - brodonam_data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  brodonam_data:
