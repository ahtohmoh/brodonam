# Render Blueprint for Brodonam
# Render dashboard → New → Blueprint → connect this repo → Render reads this file.
#
# Creates:
#   • a managed Postgres database (brodonam-db)
#   • a Node web service wired to it via DATABASE_URL
#
# Secrets marked `sync: false` are NOT stored in git — set them in the
# Render dashboard after the first deploy (Environment tab).

databases:
  - name: brodonam-db
    plan: free            # free tier expires ~90 days; upgrade to `basic-256mb` for permanence
    databaseName: brodonam
    user: brodonam

services:
  - type: web
    name: brodonam
    runtime: node
    plan: free            # upgrade to `starter` for always-on (free tier sleeps when idle)
    region: oregon        # match your Postgres region for the internal (SSL-free) connection
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production

      # Wires the internal Postgres connection string automatically.
      - key: DATABASE_URL
        fromDatabase:
          name: brodonam-db
          property: connectionString

      # Render generates a strong random value — satisfies the prod boot guard.
      - key: COOKIE_SECRET
        generateValue: true

      # ─── Set these yourself in the dashboard (Environment tab) ───
      - key: ANTHROPIC_API_KEY      # rotate first, then paste the NEW key
        sync: false
      - key: APP_URL                # e.g. https://brodonam.onrender.com (used in magic-link emails)
        sync: false
      - key: STAGING_GATE_PASSWORD  # any string; gates the whole site behind Basic auth
        sync: false
      - key: BRODONAM_ADMIN_EMAILS  # comma-separated, for the clinician approval queue
        sync: false

      # ─── Optional: real magic-link email (without these, sign-in links only print to logs) ───
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false

      # ─── Optional: voice companion ───
      - key: OPENAI_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
