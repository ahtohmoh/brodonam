# Render Blueprint for Brodonam
# Render dashboard → New → Blueprint → connect this repo → Render reads this file.
#
# Creates:
#   • a managed Postgres database (brodonam-db)
#   • a Node web service wired to it via DATABASE_URL
#
# Secrets marked `sync: false` are NOT stored in git — set them in the
# Render dashboard after the first deploy (Environment tab).

databases:
  - name: brodonam-db
    plan: basic-256mb     # paid entry tier — durable, no free-tier 90-day expiry, no "one free DB" limit
    databaseName: brodonam
    user: brodonam

services:
  - type: web
    name: brodonam
    runtime: node
    plan: standard        # 2 GB / 1 dedicated CPU — sized for ~500 concurrent SSE streams.
                          # Drop to `starter` for light traffic; bump to `pro` for headroom.
    region: oregon        # match your Postgres region for the internal (SSL-free) connection
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    autoDeploy: true
    # Horizontal autoscaling. Multi-instance is correct ONLY with REDIS_URL set
    # (so the rate limiter + spend cap are shared). Without Redis, pin to 1.
    scaling:
      minInstances: 1
      maxInstances: 1     # raise to 2–3 ONLY after REDIS_URL is set, or the
                          # spend cap + rate limiter fragment across instances
      targetMemoryPercent: 70
      targetCPUPercent: 70
    envVars:
      - key: NODE_ENV
        value: production

      # Wires the internal Postgres connection string automatically.
      - key: DATABASE_URL
        fromDatabase:
          name: brodonam-db
          property: connectionString

      # Render generates a strong random value — satisfies the prod boot guard.
      - key: COOKIE_SECRET
        generateValue: true

      # Hot-path model + realistic daily spend ceiling (raise to your budget).
      - key: CLAUDE_MODEL_MAIN
        value: claude-sonnet-4-6
      - key: DAILY_SPEND_CAP_USD
        value: "50"

      # Set REDIS_URL (e.g. a Render Key Value / Redis instance) BEFORE scaling
      # past 1 instance, so the rate limiter and spend cap stay shared/correct.
      - key: REDIS_URL
        sync: false

      # ─── Set these yourself in the dashboard (Environment tab) ───
      - key: ANTHROPIC_API_KEY      # rotate first, then paste the NEW key
        sync: false
      - key: APP_URL                # e.g. https://brodonam.onrender.com (used in magic-link emails)
        sync: false
      - key: STAGING_GATE_PASSWORD  # any string; gates the whole site behind Basic auth
        sync: false
      - key: BRODONAM_ADMIN_EMAILS  # comma-separated, for the clinician approval queue
        sync: false

      # ─── Optional: real magic-link email (without these, sign-in links only print to logs) ───
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false

      # ─── Optional: voice companion ───
      - key: OPENAI_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
