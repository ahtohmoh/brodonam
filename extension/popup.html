<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Brodonam</title>
<style>
  body { width: 280px; margin: 0; padding: 18px;
    font-family: Inter, system-ui, sans-serif; font-weight: 300;
    background: #0a0810; color: rgba(255,255,255,0.84); }
  .brand { font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase;
    color: rgba(192,144,96,0.7); margin-bottom: 18px; }
  label { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
    color: rgba(255,255,255,0.42); display: block; margin-bottom: 6px; }
  input { width: 100%; padding: 9px 10px;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.10);
    color: rgba(255,255,255,0.88); font-family: inherit; font-size: 12px;
    margin-bottom: 12px; outline: none; box-sizing: border-box; }
  button { width: 100%; padding: 10px 12px;
    background: rgba(138,120,168,0.18); border: 1px solid rgba(138,120,168,0.42);
    color: rgba(255,255,255,0.92); font-family: inherit; font-size: 10px;
    letter-spacing: 0.16em; text-transform: uppercase; cursor: pointer;
    margin-bottom: 10px; }
  button:hover { background: rgba(138,120,168,0.30); }
  .status { font-size: 11px; color: rgba(255,255,255,0.48); margin-top: 8px; line-height: 1.5; }
</style>
</head>
<body>
<div class="brand">◆ Brodonam Companion</div>
<label>API base URL</label>
<input id="api" type="url" placeholder="http://localhost:3001">
<button id="save">Save</button>
<button id="test">Test connection</button>
<div class="status" id="status">Not connected</div>
<script src="popup.js"></script>
</body>
</html>
